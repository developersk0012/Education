<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Education – Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#1a237e;--acc:#ff6f00;--bg:#f0f2ff;--card:#fff;--muted:#757575}
body{font-family:'Poppins',sans-serif;background:var(--bg);min-height:100vh;padding-bottom:76px}
.header-bg{height:150px;background:linear-gradient(135deg,#1a237e,#3949ab);position:relative}
.header-inner{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;align-items:center;gap:12px}
.back{background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer}
.hdr-title{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:#fff}
.avatar-wrap{position:absolute;bottom:-38px;left:50%;transform:translateX(-50%)}
.avatar{width:76px;height:76px;border-radius:50%;background:#fff;border:4px solid var(--acc);display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-size:30px;font-weight:800;color:var(--pri);overflow:hidden}
.avatar img{width:76px;height:76px;object-fit:cover}
.content{padding:52px 16px 16px}
.name{text-align:center;font-size:20px;font-weight:700;color:var(--pri)}
.sub{text-align:center;font-size:12px;color:var(--muted);margin:4px 0 20px}
.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(26,35,126,.08);margin-bottom:14px}
.ct{font-size:14px;font-weight:700;color:var(--pri);margin-bottom:14px;border-bottom:2px solid #ffd600;padding-bottom:8px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5}
.info-row:last-child{border-bottom:none}
.il{font-size:12px;color:var(--muted)}
.iv{font-size:13px;font-weight:600;color:#212121;text-align:right;max-width:60%;word-break:break-all}
.menu-link{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid #f5f5f5;text-decoration:none;color:#212121;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;width:100%;font-family:'Poppins',sans-serif}
.menu-link:last-child{border-bottom:none}
.menu-link .mi{font-size:20px;width:34px;height:34px;border-radius:9px;background:#e8eaf6;display:flex;align-items:center;justify-content:center}
.menu-link.danger{color:#c62828}
.menu-link.danger .mi{background:#ffebee}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid #e8e8e8;box-shadow:0 -2px 14px rgba(26,35,126,.1);z-index:200}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;text-decoration:none;color:var(--muted);font-size:10px;font-weight:500;gap:2px}
.bnav-item .ni{font-size:22px}
.bnav-item.active{color:var(--pri)}
</style>
</head>
<body>
<div class="header-bg">
  <div class="header-inner">
    <button class="back" onclick="history.back()">←</button>
    <div class="hdr-title">👤 Mera Profile</div>
  </div>
  <div class="avatar-wrap">
    <div class="avatar" id="av">S</div>
  </div>
</div>

<div class="content">
  <div class="name" id="p-name">Student</div>
  <div class="sub" id="p-sub">SK Education Member</div>

  <div class="card">
    <div class="ct">📋 Meri Jankari</div>
    <div class="info-row"><span class="il">Naam</span><span class="iv" id="d-name">-</span></div>
    <div class="info-row"><span class="il">Email</span><span class="iv" id="d-email">-</span></div>
    <div class="info-row"><span class="il">Mobile</span><span class="iv" id="d-phone">-</span></div>
    <div class="info-row"><span class="il">Class</span><span class="iv">10th</span></div>
    <div class="info-row"><span class="il">School</span><span class="iv">Swami Vivekanand Study Point</span></div>
    <div class="info-row"><span class="il">Member Since</span><span class="iv" id="d-date">-</span></div>
  </div>

  <div class="card">
    <div class="ct">⚙️ Options</div>
    <a class="menu-link" href="courses.html"><div class="mi">🎓</div>Mere Courses</a>
    <button class="menu-link" onclick="downloadCard()"><div class="mi">📄</div>ID Card Download</button>
    <button class="menu-link danger" onclick="doLogout()"><div class="mi">🚪</div>Logout</button>
  </div>
</div>

<div class="bnav">
  <a class="bnav-item" href="dashboard.html"><span class="ni">🏠</span>Home</a>
  <a class="bnav-item" href="courses.html"><span class="ni">🎓</span>Courses</a>
  <a class="bnav-item" href="courses.html?t=pdf"><span class="ni">📄</span>Notes</a>
  <a class="bnav-item active" href="profile.html"><span class="ni">👤</span>Profile</a>
</div>

<script>
const saved=localStorage.getItem('sk_user');
if(!saved){window.location.href='index.html';}
const u=JSON.parse(saved||'{}');

document.getElementById('av').textContent=(u.name||'S').charAt(0).toUpperCase();
document.getElementById('p-name').textContent=u.name||'Student';
document.getElementById('p-sub').textContent='Class 10th • SK Education Member';
document.getElementById('d-name').textContent=u.name||'-';
document.getElementById('d-email').textContent=u.email||'-';
document.getElementById('d-phone').textContent=u.phone||'Not added';
document.getElementById('d-date').textContent=u.registeredAt?new Date(u.registeredAt).toLocaleDateString('en-IN'):'-';

window.doLogout=()=>{if(confirm('Logout karna chahte hain?')){localStorage.removeItem('sk_user');window.location.href='index.html';}};

window.downloadCard=()=>{
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a5'});
  doc.setFillColor(13,27,94);doc.rect(0,0,148,210,'F');
  doc.setFillColor(255,255,255);doc.roundedRect(8,8,132,194,8,8,'F');
  doc.setFillColor(26,35,126);doc.roundedRect(8,8,132,48,8,8,'F');
  doc.setFillColor(26,35,126);doc.rect(8,44,132,12,'F');
  doc.setDrawColor(255,214,0);doc.setLineWidth(1.2);doc.line(8,56,140,56);
  doc.setTextColor(255,214,0);doc.setFontSize(17);doc.setFont('helvetica','bold');
  doc.text('SK EDUCATION',74,24,{align:'center'});
  doc.setTextColor(255,255,255);doc.setFontSize(8.5);doc.setFont('helvetica','normal');
  doc.text('Swami Vivekanand Study Point',74,33,{align:'center'});
  doc.text('Direction to Success',74,41,{align:'center'});
  doc.setTextColor(26,35,126);doc.setFontSize(11);doc.setFont('helvetica','bold');
  doc.text('STUDENT IDENTITY CARD',74,68,{align:'center'});
  doc.setFillColor(232,234,246);doc.circle(74,92,16,'F');
  doc.setDrawColor(255,111,0);doc.setLineWidth(1);doc.circle(74,92,16,'S');
  doc.setTextColor(26,35,126);doc.setFontSize(20);doc.setFont('helvetica','bold');
  doc.text((u.name||'S').charAt(0).toUpperCase(),74,97,{align:'center'});
  doc.setFontSize(14);doc.text(u.name||'Student',74,116,{align:'center'});
  doc.setDrawColor(230,230,230);doc.setLineWidth(0.4);doc.line(18,121,130,121);
  const rows=[['Email',u.email||'-'],['Mobile',u.phone||'-'],['Class','10th (2026-27)'],['Institution','Swami Vivekanand Study Point'],['Registered',u.registeredAt?new Date(u.registeredAt).toLocaleDateString('en-IN'):'-']];
  let y=130;
  rows.forEach(([l,v])=>{
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(140,140,140);doc.text(l,18,y);
    doc.setFont('helvetica','bold');doc.setTextColor(33,33,33);
    doc.text(v.length>32?v.substring(0,32)+'...':v,18,y+5);y+=13;
  });
  doc.setFillColor(255,111,0);doc.rect(8,188,132,14,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(7.5);doc.setFont('helvetica','normal');
  doc.text('skeducation.in  •  Valid Academic Year 2026-27',74,196,{align:'center'});
  doc.save('SK_ID_'+(u.name||'student').replace(/ /g,'_')+'.pdf');
};
</script>
</body>
</html>
