<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Education – Profile</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{padding-bottom:76px}
.hero{height:150px;background:linear-gradient(135deg,var(--pri-dark),var(--pri),var(--pri-light));position:relative}
.hero-btns{position:absolute;top:14px;left:16px;right:16px;display:flex;align-items:center;gap:10px}
.hero-title{font-family:'Baloo 2',cursive;font-size:19px;font-weight:800;color:#fff}
.avatar-box{position:absolute;bottom:-40px;left:50%;transform:translateX(-50%)}
.avatar{width:80px;height:80px;border-radius:50%;background:var(--card);border:4px solid var(--acc);display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-size:32px;font-weight:800;color:var(--pri);box-shadow:0 4px 18px rgba(0,0,0,.2)}
.content{padding:54px 16px 16px}
.pname{text-align:center;font-size:20px;font-weight:700;color:var(--pri)}
.psub{text-align:center;font-size:12px;color:var(--muted);margin:4px 0 20px}
.info-card{background:var(--card);border-radius:16px;padding:18px 18px 6px;box-shadow:var(--shadow);margin-bottom:14px}
.info-card-title{font-size:14px;font-weight:700;color:var(--pri);border-bottom:2px solid var(--gold);padding-bottom:8px;margin-bottom:2px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f5f5f5}
.info-row:last-child{border-bottom:none}
.ir-label{font-size:12px;color:var(--muted)}
.ir-val{font-size:13px;font-weight:600;color:var(--text);text-align:right;max-width:60%;word-break:break-all}
.option-card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:14px}
.opt-link{display:flex;align-items:center;gap:13px;padding:14px 18px;color:var(--text);font-size:14px;font-weight:500;text-decoration:none;border:none;background:none;width:100%;font-family:'Poppins',sans-serif;cursor:pointer;transition:background .15s;border-bottom:1px solid #f5f5f5}
.opt-link:last-child{border-bottom:none}
.opt-link:hover{background:#f8f9ff}
.opt-icon{width:36px;height:36px;border-radius:10px;background:#e8eaf6;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.opt-link.danger{color:var(--danger)}
.opt-link.danger .opt-icon{background:#ffebee}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-btns">
    <button class="back-btn" onclick="history.back()">←</button>
    <div class="hero-title">Mera Profile</div>
  </div>
  <div class="avatar-box">
    <div class="avatar" id="av">S</div>
  </div>
</div>
<div class="content">
  <div class="pname" id="p-name">Student</div>
  <div class="psub">Class 10th • SK Education Member</div>
  <div class="info-card">
    <div class="info-card-title">📋 Meri Jankari</div>
    <div class="info-row"><span class="ir-label">Naam</span><span class="ir-val" id="d-name">-</span></div>
    <div class="info-row"><span class="ir-label">Email</span><span class="ir-val" id="d-email">-</span></div>
    <div class="info-row"><span class="ir-label">Mobile</span><span class="ir-val" id="d-phone">-</span></div>
    <div class="info-row"><span class="ir-label">Class</span><span class="ir-val">10th</span></div>
    <div class="info-row"><span class="ir-label">School</span><span class="ir-val">Swami Vivekanand Study Point</span></div>
    <div class="info-row"><span class="ir-label">Member Since</span><span class="ir-val" id="d-date">-</span></div>
  </div>
  <div class="option-card">
    <a class="opt-link" href="courses.html"><div class="opt-icon">🎓</div>Mere Courses</a>
    <button class="opt-link" onclick="downloadCard()"><div class="opt-icon">🪪</div>Student ID Card Download</button>
    <button class="opt-link" onclick="downloadAccountPDF()"><div class="opt-icon">📋</div>Account Details PDF Download</button>
    <button class="opt-link danger" onclick="doLogout()"><div class="opt-icon">🚪</div>Logout</button>
  </div>
</div>
<div class="bnav">
  <a class="bnav-item" href="dashboard.html"><span class="ni">🏠</span>Home</a>
  <a class="bnav-item" href="courses.html"><span class="ni">🎓</span>Courses</a>
  <a class="bnav-item" href="courses.html?t=pdf"><span class="ni">📄</span>Notes</a>
  <a class="bnav-item active" href="profile.html"><span class="ni">👤</span>Profile</a>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/script.js"></script>
<script>
const saved=localStorage.getItem('sk_user');
if(!saved){window.location.replace('index.html');}
const u=JSON.parse(saved||'{}');
document.getElementById('av').textContent=(u.name||'S').charAt(0).toUpperCase();
document.getElementById('p-name').textContent=u.name||'Student';
document.getElementById('d-name').textContent=u.name||'-';
document.getElementById('d-email').textContent=u.email||'-';
document.getElementById('d-phone').textContent=u.phone||'Not added';
document.getElementById('d-date').textContent=u.registeredAt?new Date(u.registeredAt).toLocaleDateString('en-IN'):'-';
window.doLogout=()=>{if(confirm('Logout karna chahte hain?')){localStorage.removeItem('sk_user');window.location.replace('index.html');}};
</script>
</body>
</html>
