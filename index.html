<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Education – Login</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{background:#0d1654;display:flex;align-items:center;justify-content:center;padding:16px;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 25% 60%,rgba(255,111,0,.17) 0%,transparent 55%),radial-gradient(ellipse at 75% 20%,rgba(57,73,171,.35) 0%,transparent 55%);pointer-events:none}
.wrap{width:100%;max-width:390px;position:relative;z-index:1}
.logo-area{text-align:center;margin-bottom:26px}
.big-logo{width:92px;height:92px;border-radius:50%;background:#fff;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;border:3px solid var(--gold);box-shadow:0 0 0 8px rgba(255,214,0,.10);overflow:hidden}
.big-logo img{width:76px;height:76px;object-fit:contain;border-radius:50%}
.big-logo .lf{font-family:'Baloo 2',cursive;font-size:30px;font-weight:800;color:var(--pri)}
.brand{font-family:'Baloo 2',cursive;font-size:27px;font-weight:800;color:#fff}
.tagline{font-size:10px;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;margin-top:3px}
.lcard{background:rgba(255,255,255,.97);border-radius:22px;padding:28px 24px;box-shadow:0 24px 60px rgba(0,0,0,.4);position:relative;overflow:hidden}
.lcard::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--pri),var(--pri-lt),var(--acc))}
.lcard h2{font-size:20px;font-weight:700;color:var(--pri);margin-bottom:4px}
.lcard p{font-size:13px;color:var(--muted);margin-bottom:20px}
.forgot{text-align:right;margin-top:-8px;margin-bottom:14px}
.forgot a{font-size:12px;font-weight:500;color:var(--pri);text-decoration:none}
.bottom-link{text-align:center;font-size:13px;color:var(--muted);margin-top:16px}
.bottom-link a{font-weight:600;color:var(--pri);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="big-logo">
      <img src="sk.png" alt="SK" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="lf" style="display:none">SK</div>
    </div>
    <div class="brand">SK Education</div>
    <div class="tagline">Swami Vivekanand Study Point</div>
  </div>

  <div class="lcard">
    <h2>Welcome Back 👋</h2>
    <p>Apne account mein login karein</p>
    <div class="msg" id="msg"></div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap has-icon">
        <span class="input-icon">✉️</span>
        <input type="email" id="email" placeholder="apna@email.com" autocomplete="email">
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap has-icon">
        <span class="input-icon">🔒</span>
        <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>
    <div class="forgot"><a href="#">Password bhul gaye?</a></div>

    <button class="btn btn-primary btn-block" id="login-btn" onclick="doLogin()">Login karein</button>
    <div class="divider">ya phir</div>
    <button class="btn btn-google btn-block" id="g-btn" onclick="doGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="G">
      Google se Login
    </button>
    <div class="bottom-link">Naya account? <a href="signup.html">Register karein</a></div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,GoogleAuthProvider,signInWithPopup}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getDatabase,ref,get,set}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app=initializeApp({apiKey:"AIzaSyAXvrUDLT9JosL5eE4SsXqiuGP8rmS9RYk",authDomain:"education-bd8a9.firebaseapp.com",databaseURL:"https://education-bd8a9-default-rtdb.firebaseio.com",projectId:"education-bd8a9",storageBucket:"education-bd8a9.firebasestorage.app",messagingSenderId:"44581091231",appId:"1:44581091231:android:76d10f0d2597d3b64bafaa"});
const auth=getAuth(app),db=getDatabase(app);

// Already logged in → go straight to dashboard
if(localStorage.getItem('sk_user')){window.location.replace('dashboard.html');}

function showMsg(txt,type){const el=document.getElementById('msg');el.textContent=txt;el.className='msg show msg-'+(type==='err'?'err':'ok');}

async function afterLogin(user){
  let snap=await get(ref(db,'users/'+user.uid));
  let data;
  if(snap.exists()){data=snap.val();}
  else{
    data={name:user.displayName||'Student',email:user.email,phone:'',class:'10th',school:'Swami Vivekanand Study Point',registeredAt:new Date().toISOString(),role:'student'};
    await set(ref(db,'users/'+user.uid),data);
  }
  localStorage.setItem('sk_user',JSON.stringify({uid:user.uid,...data}));
  window.location.replace('dashboard.html');
}

window.doLogin=async()=>{
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  if(!email||!pass){showMsg('Email aur password dono bharein','err');return;}
  const btn=document.getElementById('login-btn');
  btn.innerHTML='<span class="spinner"></span> Login...';btn.disabled=true;
  try{const c=await signInWithEmailAndPassword(auth,email,pass);await afterLogin(c.user);}
  catch(e){
    const m={'auth/user-not-found':'Email registered nahi hai','auth/wrong-password':'Password galat hai','auth/invalid-credential':'Email ya password galat hai','auth/too-many-requests':'Bahut zyada attempts. Thodi der baad try karein'};
    showMsg(m[e.code]||e.message,'err');btn.innerHTML='Login karein';btn.disabled=false;
  }
};

window.doGoogle=async()=>{
  const btn=document.getElementById('g-btn');
  btn.innerHTML='<span class="spinner spinner-dk"></span> Connecting...';btn.disabled=true;
  try{const c=await signInWithPopup(auth,new GoogleAuthProvider());await afterLogin(c.user);}
  catch(e){showMsg('Google login fail: '+e.message,'err');btn.innerHTML='<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20"> Google se Login';btn.disabled=false;}
};
</script>
</body>
</html>
