<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Education – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0d1b5e;position:relative;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(255,111,0,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(26,35,126,.4) 0%,transparent 60%);pointer-events:none}
.bg-circles{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.bg-circles span{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.06)}
.bg-circles span:nth-child(1){width:400px;height:400px;top:-100px;right:-100px}
.bg-circles span:nth-child(2){width:250px;height:250px;bottom:-50px;left:-50px}
.bg-circles span:nth-child(3){width:150px;height:150px;top:50%;left:10%}
.wrap{width:100%;max-width:400px;padding:16px;position:relative;z-index:1}
.logo-area{text-align:center;margin-bottom:28px}
.logo-ring{width:88px;height:88px;border-radius:50%;background:#fff;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;border:3px solid #ffd600;box-shadow:0 0 0 8px rgba(255,214,0,.12)}
.logo-ring img{width:72px;height:72px;object-fit:contain;border-radius:50%}
.logo-ring .lf{font-family:'Baloo 2',cursive;font-size:28px;font-weight:800;color:#1a237e}
.brand{font-family:'Baloo 2',cursive;font-size:26px;font-weight:800;color:#fff;letter-spacing:.5px}
.tagline{font-size:11px;color:#ffd600;letter-spacing:2.5px;text-transform:uppercase;margin-top:2px}
.card{background:rgba(255,255,255,.97);border-radius:22px;padding:30px 26px;box-shadow:0 24px 64px rgba(0,0,0,.35);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#1a237e,#3949ab,#ff6f00)}
.card-title{font-size:20px;font-weight:600;color:#1a237e;margin-bottom:6px}
.card-sub{font-size:13px;color:#757575;margin-bottom:22px}
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:#424242;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.input-wrap{position:relative}
.input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:#9e9e9e}
input[type=email],input[type=password]{width:100%;padding:12px 12px 12px 40px;border:2px solid #e0e0e0;border-radius:11px;font-family:'Poppins',sans-serif;font-size:14px;color:#212121;background:#fafafa;outline:none;transition:border-color .2s,background .2s}
input:focus{border-color:#1a237e;background:#fff}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-family:'Poppins',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;box-shadow:0 4px 18px rgba(26,35,126,.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(26,35,126,.45)}
.btn-google{background:#fff;color:#3c4043;border:2px solid #e0e0e0;margin-top:8px}
.btn-google:hover{background:#f8f9fa;border-color:#bbb}
.btn-google img{width:20px;height:20px}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:#bdbdbd;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e0e0e0}
.link-row{text-align:center;font-size:13px;color:#757575;margin-top:14px}
.link-row a{color:#1a237e;font-weight:600;text-decoration:none}
.forgot{text-align:right;margin-top:-6px;margin-bottom:14px}
.forgot a{font-size:12px;color:#1a237e;text-decoration:none;font-weight:500}
.msg{padding:10px 14px;border-radius:9px;font-size:13px;margin-bottom:12px;display:none}
.msg.err{background:#ffebee;color:#c62828;border-left:3px solid #c62828;display:block}
.msg.ok{background:#e8f5e9;color:#2e7d32;border-left:3px solid #2e7d32;display:block}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-circles"><span></span><span></span><span></span></div>
<div class="wrap">
  <div class="logo-area">
    <div class="logo-ring">
      <img src="sk.png" alt="SK" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="lf" style="display:none">SK</div>
    </div>
    <div class="brand">SK Education</div>
    <div class="tagline">Swami Vivekanand Study Point</div>
  </div>

  <div class="card">
    <div class="card-title">Welcome Back 👋</div>
    <div class="card-sub">Login karein apne account mein</div>
    <div class="msg" id="msg"></div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="email" placeholder="apna@email.com" autocomplete="email">
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>
    <div class="forgot"><a href="#">Password bhul gaye?</a></div>

    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Login</button>

    <div class="divider">ya phir</div>

    <button class="btn btn-google" id="google-btn" onclick="doGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
      Google se Login
    </button>

    <div class="link-row">Naya account? <a href="signup.html">Register karein</a></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyAXvrUDLT9JosL5eE4SsXqiuGP8rmS9RYk",
  authDomain:"education-bd8a9.firebaseapp.com",
  databaseURL:"https://education-bd8a9-default-rtdb.firebaseio.com",
  projectId:"education-bd8a9",
  storageBucket:"education-bd8a9.firebasestorage.app",
  messagingSenderId:"44581091231",
  appId:"1:44581091231:android:76d10f0d2597d3b64bafaa"
});
const auth = getAuth(app);
const db = getDatabase(app);

// Already logged in?
const saved = localStorage.getItem('sk_user');
if(saved) window.location.href = 'dashboard.html';

function showMsg(txt, type){ const el=document.getElementById('msg'); el.textContent=txt; el.className='msg '+type; }

async function afterLogin(user){
  let snap = await get(ref(db,'users/'+user.uid));
  let userData;
  if(snap.exists()){
    userData = snap.val();
  } else {
    // Google user first time — save basic info
    userData = {
      name: user.displayName || 'Student',
      email: user.email,
      phone: '',
      class: '10th',
      school: 'Swami Vivekanand Study Point',
      registeredAt: new Date().toISOString(),
      role: 'student'
    };
    await set(ref(db,'users/'+user.uid), userData);
    localStorage.setItem('sk_new_user','1');
  }
  localStorage.setItem('sk_user', JSON.stringify({uid:user.uid,...userData}));
  window.location.href = 'dashboard.html';
}

window.doLogin = async () => {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value.trim();
  if(!email||!pass){ showMsg('Email aur password dono bharein','err'); return; }
  const btn = document.getElementById('login-btn');
  btn.innerHTML='<span class="spinner"></span> Logging in...';
  btn.disabled=true;
  try{
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    await afterLogin(cred.user);
  }catch(e){
    const msgs={'auth/user-not-found':'Yeh email registered nahi hai','auth/wrong-password':'Password galat hai','auth/invalid-credential':'Email ya password galat hai','auth/too-many-requests':'Bahut zyada attempts. Thodi der baad try karein'};
    showMsg(msgs[e.code]||'Login fail: '+e.message,'err');
    btn.innerHTML='Login'; btn.disabled=false;
  }
};

window.doGoogle = async () => {
  const btn = document.getElementById('google-btn');
  btn.innerHTML='<span class="spinner" style="border-top-color:#1a237e"></span> Connecting...';
  btn.disabled=true;
  try{
    const provider = new GoogleAuthProvider();
    const cred = await signInWithPopup(auth, provider);
    await afterLogin(cred.user);
  }catch(e){
    showMsg('Google login fail: '+e.message,'err');
    btn.innerHTML='<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:20px"> Google se Login';
    btn.disabled=false;
  }
};
</script>
</body>
</html>
