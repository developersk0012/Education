<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Education – Courses</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#1a237e;--acc:#ff6f00;--bg:#f0f2ff;--card:#fff;--muted:#757575}
body{font-family:'Poppins',sans-serif;background:var(--bg);min-height:100vh;padding-bottom:76px}
.header{background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(26,35,126,.3)}
.back{background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.page-title{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800}
.filters{display:flex;gap:7px;padding:12px 14px;overflow-x:auto;background:#fff;border-bottom:1px solid #e8e8e8}
.filters::-webkit-scrollbar{display:none}
.fb{padding:6px 14px;border-radius:20px;border:2px solid #e0e0e0;background:transparent;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--muted);font-family:'Poppins',sans-serif;transition:all .15s}
.fb.active{border-color:var(--pri);background:var(--pri);color:#fff}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:14px}
.card{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(26,35,126,.1);cursor:pointer;transition:all .18s}
.card:hover{transform:translateY(-2px)}
.thumb{width:100%;height:115px;object-fit:cover}
.thumb-f{width:100%;height:115px;display:flex;align-items:center;justify-content:center;font-size:38px;background:linear-gradient(135deg,#e8eaf6,#c5cae9)}
.ci{padding:10px}
.cat{font-size:9px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:1px}
.title{font-size:12px;font-weight:700;color:#212121;margin:3px 0 5px;line-height:1.3}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{padding:2px 7px;border-radius:8px;font-size:9px;font-weight:700}
.tag-free{background:#e8f5e9;color:#2e7d32}
.tag-paid{background:#fff3e0;color:#e65100}
.tag-video{background:#e3f2fd;color:#1565c0}
.tag-pdf{background:#fce4ec;color:#c62828}
.view-btn{display:block;width:100%;padding:8px;background:var(--pri);color:#fff;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif}
.empty{grid-column:span 2;text-align:center;padding:48px 20px;color:var(--muted)}
.empty .ei{font-size:48px;margin-bottom:12px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid #e8e8e8;box-shadow:0 -2px 14px rgba(26,35,126,.1);z-index:200}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;text-decoration:none;color:var(--muted);font-size:10px;font-weight:500;gap:2px;transition:color .2s}
.bnav-item .ni{font-size:22px}
.bnav-item.active{color:var(--pri)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500}
.modal-bg.open{display:flex;align-items:flex-end}
.modal-box{background:#fff;border-radius:22px 22px 0 0;width:100%;padding:22px 20px;max-height:88vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
.mc{float:right;background:none;border:none;font-size:24px;cursor:pointer;color:#9e9e9e}
.mt{font-size:17px;font-weight:700;color:var(--pri);margin-bottom:5px}
.mm{font-size:12px;color:var(--muted);margin-bottom:14px}
.yt-f{width:100%;aspect-ratio:16/9;border:none;border-radius:12px}
.pdf-a{display:flex;align-items:center;gap:10px;background:#e8eaf6;border-radius:12px;padding:16px;text-decoration:none;color:var(--pri);font-weight:600;font-size:14px}
.spin{display:inline-block;width:26px;height:26px;border:3px solid #e0e0e0;border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px;grid-column:span 2}
</style>
</head>
<body>
<div class="header">
  <button class="back" onclick="history.back()">←</button>
  <div class="page-title" id="pg-title">📚 Courses</div>
</div>

<div class="filters" id="filters">
  <button class="fb active" onclick="applyFilter('all',this)">Sab</button>
  <button class="fb" onclick="applyFilter('free',this)">🆓 Free</button>
  <button class="fb" onclick="applyFilter('paid',this)">💰 Paid</button>
  <button class="fb" onclick="applyFilter('video',this)">🎥 Video</button>
  <button class="fb" onclick="applyFilter('pdf',this)">📄 PDF/Notes</button>
  <button class="fb" onclick="applyFilter('Hindi',this)">Hindi</button>
  <button class="fb" onclick="applyFilter('Math',this)">Math</button>
  <button class="fb" onclick="applyFilter('Science',this)">Science</button>
  <button class="fb" onclick="applyFilter('History',this)">History</button>
  <button class="fb" onclick="applyFilter('Sanskrit',this)">Sanskrit</button>
  <button class="fb" onclick="applyFilter('English',this)">English</button>
</div>

<div class="grid" id="grid">
  <div class="loading"><div class="spin"></div></div>
</div>

<div class="bnav">
  <a class="bnav-item" href="dashboard.html"><span class="ni">🏠</span>Home</a>
  <a class="bnav-item active" href="courses.html"><span class="ni">🎓</span>Courses</a>
  <a class="bnav-item" href="courses.html?t=pdf"><span class="ni">📄</span>Notes</a>
  <a class="bnav-item" href="profile.html"><span class="ni">👤</span>Profile</a>
</div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeM()">
  <div class="modal-box" id="modal-body"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyAXvrUDLT9JosL5eE4SsXqiuGP8rmS9RYk",
  authDomain:"education-bd8a9.firebaseapp.com",
  databaseURL:"https://education-bd8a9-default-rtdb.firebaseio.com",
  projectId:"education-bd8a9"
});
const db = getDatabase(app);
if(!localStorage.getItem('sk_user')) window.location.href='index.html';

const params = new URLSearchParams(location.search);
const pf=params.get('f'), pt=params.get('t'), pc=params.get('cat');

let all=[];
let activeFilter='all';

async function load(){
  const snap=await get(ref(db,'courses'));
  const grid=document.getElementById('grid');
  if(!snap.exists()){grid.innerHTML='<div class="empty"><div class="ei">📭</div>Koi course nahi hai abhi</div>';return;}
  all=Object.entries(snap.val()).reverse();
  // Apply URL filter
  if(pf==='free'){activeFilter='free';setActiveBtn('free');}
  else if(pf==='paid'){activeFilter='paid';setActiveBtn('paid');}
  if(pt==='pdf'){activeFilter='pdf';setActiveBtn('pdf');}
  if(pc){activeFilter=pc;setActiveBtn(pc);}
  render();
}

function setActiveBtn(val){
  document.querySelectorAll('.fb').forEach(b=>{
    b.classList.toggle('active',b.textContent.trim()===val||b.getAttribute('onclick').includes("'"+val+"'"));
  });
}

function render(){
  const filtered = all.filter(([_,c])=>{
    if(activeFilter==='all') return true;
    if(activeFilter==='free') return c.isFree;
    if(activeFilter==='paid') return !c.isFree;
    if(activeFilter==='video') return c.type==='video';
    if(activeFilter==='pdf') return c.type==='pdf';
    return c.category===activeFilter;
  });
  const grid=document.getElementById('grid');
  if(!filtered.length){grid.innerHTML='<div class="empty"><div class="ei">🔍</div>Koi match nahi mila</div>';return;}
  grid.innerHTML=filtered.map(([id,c])=>{
    const th=c.posterUrl?`<img class="thumb" src="${c.posterUrl}" alt="${c.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
    return `<div class="card" onclick="openC('${id}')">
      ${th}
      <div class="thumb-f" ${c.posterUrl?'style="display:none"':''}>📚</div>
      <div class="ci">
        <div class="cat">${c.category||''}</div>
        <div class="title">${c.title||'Untitled'}</div>
        <div class="tags">
          <span class="tag tag-${c.isFree?'free':'paid'}">${c.isFree?'Free':'Paid'}</span>
          <span class="tag tag-${c.type}">${c.type==='video'?'🎥':'📄'}</span>
        </div>
      </div>
      <button class="view-btn">Dekhein</button>
    </div>`;
  }).join('');
}

window.applyFilter=(f,btn)=>{
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter=f;
  render();
};

window.openC=(id)=>{
  const c=all.find(([i])=>i===id)?.[1];if(!c)return;
  let html=`<button class="mc" onclick="closeM()">✕</button>
    <div class="mt">${c.title}</div>
    <div class="mm">${c.category||''} ${c.subcategory?'→ '+c.subcategory:''} • ${c.isFree?'🆓 Free':'💰 Paid'}</div>`;
  if(c.type==='video'&&c.youtubeLink){
    const vid=c.youtubeLink.includes('v=')?c.youtubeLink.split('v=')[1].split('&')[0]:c.youtubeLink.split('/').pop().split('?')[0];
    html+=`<iframe class="yt-f" src="https://www.youtube.com/embed/${vid}" allowfullscreen></iframe>`;
  }else if(c.pdfUrl){
    html+=`<a class="pdf-a" href="${c.pdfUrl}" target="_blank">📄 PDF / Notes kholen</a>`;
  }
  if(c.description)html+=`<p style="margin-top:12px;font-size:13px;color:#616161;line-height:1.6">${c.description}</p>`;
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal').classList.add('open');
};
window.closeM=()=>document.getElementById('modal').classList.remove('open');

load();
</script>
</body>
</html>
