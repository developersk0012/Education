<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Education – Courses</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{padding-bottom:76px}
.filters-bar{background:#fff;border-bottom:1px solid #ebebeb;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 12px;display:flex;gap:7px;position:sticky;top:52px;z-index:150}
.filters-bar::-webkit-scrollbar{display:none}
.fb{padding:7px 14px;border-radius:20px;border:2px solid var(--border);background:transparent;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--muted);font-family:'Poppins',sans-serif;transition:all .15s;flex-shrink:0}
.fb.active{border-color:var(--pri);background:var(--pri);color:#fff}
.courses-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:14px}
.cc{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent}
.cc:active{transform:scale(.97);box-shadow:var(--shadow-lg)}
.cc-thumb{width:100%;height:110px;object-fit:cover;display:block}
.cc-fall{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-size:38px;background:linear-gradient(135deg,#e8eaf6,#c5cae9)}
.cc-body{padding:10px}
.cc-cat{font-size:9px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:1px}
.cc-sub{font-size:9px;color:var(--muted);margin-left:3px}
.cc-title{font-size:12px;font-weight:700;color:var(--text);margin:4px 0 6px;line-height:1.35}
.cc-tags{display:flex;gap:4px;flex-wrap:wrap}
.open-btn{display:block;width:100%;padding:9px;background:var(--pri);color:#fff;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif}
</style>
</head>
<body>
<div class="page-header">
  <div class="header-row">
    <button class="back-btn" onclick="history.back()">←</button>
    <div class="page-title-text" id="pg-title">📚 Courses</div>
  </div>
</div>
<div class="filters-bar">
  <button class="fb" data-key="all" onclick="setF('all',this)">Sab</button>
  <button class="fb" data-key="free" onclick="setF('free',this)">🆓 Free</button>
  <button class="fb" data-key="paid" onclick="setF('paid',this)">💰 Paid</button>
  <button class="fb" data-key="video" onclick="setF('video',this)">🎥 Video</button>
  <button class="fb" data-key="pdf" onclick="setF('pdf',this)">📄 PDF/Notes</button>
  <button class="fb" data-key="Hindi" onclick="setF('Hindi',this)">Hindi</button>
  <button class="fb" data-key="Sanskrit" onclick="setF('Sanskrit',this)">Sanskrit</button>
  <button class="fb" data-key="Math" onclick="setF('Math',this)">Math</button>
  <button class="fb" data-key="Science" onclick="setF('Science',this)">Science</button>
  <button class="fb" data-key="History" onclick="setF('History',this)">History</button>
  <button class="fb" data-key="English" onclick="setF('English',this)">English</button>
  <button class="fb" data-key="NCERT" onclick="setF('NCERT',this)">NCERT</button>
</div>
<div class="courses-grid" id="grid">
  <div class="loading-center" style="grid-column:span 2"><div class="big-spinner"></div><span>Loading...</span></div>
</div>
<div class="bnav">
  <a class="bnav-item" href="dashboard.html"><span class="ni">🏠</span>Home</a>
  <a class="bnav-item active" href="courses.html"><span class="ni">🎓</span>Courses</a>
  <a class="bnav-item" href="courses.html?t=pdf"><span class="ni">📄</span>Notes</a>
  <a class="bnav-item" href="profile.html"><span class="ni">👤</span>Profile</a>
</div>
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeM()">
  <div class="modal-sheet" id="modal-body" style="max-height:90vh;overflow-y:auto"></div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,get}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const FC={apiKey:"AIzaSyAXvrUDLT9JosL5eE4SsXqiuGP8rmS9RYk",authDomain:"education-bd8a9.firebaseapp.com",databaseURL:"https://education-bd8a9-default-rtdb.firebaseio.com",projectId:"education-bd8a9",storageBucket:"education-bd8a9.firebasestorage.app",messagingSenderId:"44581091231",appId:"1:44581091231:android:76d10f0d2597d3b64bafaa"};
const app=initializeApp(FC),db=getDatabase(app);
if(!localStorage.getItem('sk_user')){window.location.replace('index.html');}
const params=new URLSearchParams(location.search);
let activeKey='all',allItems=[];
function getYTId(url){try{if(!url)return '';if(url.includes('v='))return url.split('v=')[1].split('&')[0];if(url.includes('youtu.be/'))return url.split('youtu.be/')[1].split('?')[0];if(url.includes('embed/'))return url.split('embed/')[1].split('?')[0];return url.split('/').pop().split('?')[0];}catch{return '';}}
async function load(){
  try{
    const snap=await get(ref(db,'courses'));
    if(!snap.exists()){render([]);return;}
    // Only show actual content (video/pdf), not course containers
    allItems=Object.entries(snap.val()).filter(([_,c])=>c.contentType==='video'||c.contentType==='pdf').reverse();
    // Set active filter from URL params
    const f=params.get('f'),t=params.get('t'),cat=params.get('cat');
    if(f==='free')activeKey='free';
    else if(f==='paid')activeKey='paid';
    else if(t==='pdf'){activeKey='pdf';document.getElementById('pg-title').textContent='📄 PDF & Notes';}
    else if(t==='video')activeKey='video';
    else if(cat){activeKey=cat;document.getElementById('pg-title').textContent='📚 '+cat;}
    else activeKey='all';
    // Set active button
    document.querySelectorAll('.fb').forEach(b=>{b.classList.toggle('active',b.dataset.key===activeKey);});
    render(filtered());
  }catch(e){document.getElementById('grid').innerHTML=`<div style="grid-column:span 2;padding:30px;text-align:center;color:red">Load fail: ${e.message}</div>`;}
}
function filtered(){
  return allItems.filter(([_,c])=>{
    if(activeKey==='all')return true;
    if(activeKey==='free')return !!c.isFree;
    if(activeKey==='paid')return !c.isFree;
    if(activeKey==='video')return c.contentType==='video';
    if(activeKey==='pdf')return c.contentType==='pdf';
    return c.category===activeKey;
  });
}
function render(list){
  const grid=document.getElementById('grid');
  if(!list.length){grid.innerHTML=`<div class="empty-state" style="grid-column:span 2"><div class="empty-icon">🔍</div><div class="empty-title">Koi content nahi mila</div><div class="empty-sub">Dusra filter try karein</div></div>`;return;}
  grid.innerHTML=list.map(([id,c])=>{
    const poster=c.posterUrl||c.thumbnail||'';
    return `<div class="cc" onclick="openC('${id}')">
      ${poster?`<img class="cc-thumb" src="${poster}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
      <div class="cc-fall"${poster?' style="display:none"':''}>📚</div>
      <div class="cc-body">
        <div><span class="cc-cat">${c.category||''}</span><span class="cc-sub">${c.subcategory||''}</span></div>
        <div class="cc-title">${c.title||'Untitled'}</div>
        <div class="cc-tags">
          <span class="chip chip-${c.isFree?'free':'paid'}">${c.isFree?'Free':'Paid'}</span>
          <span class="chip chip-${c.contentType}">${c.contentType==='video'?'🎥':'📄'}</span>
        </div>
      </div>
      <button class="open-btn">Dekhein</button>
    </div>`;
  }).join('');
}
window.setF=(key,btn)=>{document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeKey=key;render(filtered());};
window.openC=(id)=>{
  const found=allItems.find(([i])=>i===id);if(!found)return;
  const c=found[1];
  let html=`<button class="modal-close" onclick="closeM()">✕</button>
    <div class="modal-title">${c.title||'Course'}</div>
    <div class="modal-sub">${c.category||''}${c.subcategory?' → '+c.subcategory:''} &nbsp;•&nbsp; ${c.isFree?'🆓 Free':'💰 Paid'}</div>`;
  if(c.contentType==='video'&&c.youtubeLink){
    const vid=getYTId(c.youtubeLink);
    if(vid)html+=`<iframe class="yt-frame" src="https://www.youtube.com/embed/${vid}" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
    else html+=`<a class="pdf-open-btn" href="${c.youtubeLink}" target="_blank">🎥 Video dekhein →</a>`;
  }else if(c.pdfUrl){
    html+=`<a class="pdf-open-btn" href="${c.pdfUrl}" target="_blank" rel="noopener noreferrer">
      <span style="font-size:32px">📄</span>
      <div><div style="font-weight:700;font-size:15px">${c.title||'PDF'}</div><div style="font-size:12px;color:var(--muted);margin-top:3px">Tap karo → PDF/Notes khulegा</div></div>
      <span style="margin-left:auto;font-size:22px;color:var(--acc)">→</span></a>`;
  }
  if(c.description)html+=`<div style="font-size:13px;color:#555;line-height:1.7;margin-top:10px">${c.description}</div>`;
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal').classList.add('open');
};
window.closeM=()=>document.getElementById('modal').classList.remove('open');
load();
</script>
</body>
</html>
